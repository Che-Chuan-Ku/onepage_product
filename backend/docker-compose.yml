version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: onepage-postgres
    environment:
      POSTGRES_DB: onepage
      POSTGRES_USER: onepage
      POSTGRES_PASSWORD: onepage
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onepage"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: onepage-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
