<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>後台發票管理頁 Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        olive: { 50:'#f7f8f0', 100:'#eef0e1', 200:'#dce1c3', 300:'#c4cc9a', 400:'#a8b36e', 500:'#8d9a4f', 600:'#6e7b3b', 700:'#4A5D23', 800:'#3d4c1f', 900:'#2e3a17' },
        terra: { 50:'#fdf5f2', 100:'#fbe8e0', 200:'#f5cfc0', 300:'#edae96', 400:'#e28a6a', 500:'#C75B39', 600:'#b74a2c', 700:'#993d25', 800:'#7d3422', 900:'#6a2e20' },
        cream: { 50:'#FEFDFB', 100:'#FAF7F2', 200:'#F5EFE6', 300:'#EDE4D4' }
      },
      fontFamily: {
        display: ['Playfair Display', 'serif'],
        body: ['Source Sans 3', 'sans-serif']
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #FAF7F2; }
  input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #4A5D23; }
  .sidebar-link { transition: all 0.2s; }
  .sidebar-link:hover { background: rgba(74,93,35,0.1); }
  .sidebar-link.active { background: rgba(74,93,35,0.15); border-right: 3px solid #4A5D23; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// REQ-034: RBAC 側邊選單
const ALL_NAV_ITEMS = [
  { label: '商品管理', href: '../admin-products/index.html', icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4', roles: ['管理員','一般使用者'] },
  { label: '商品類型', href: '../admin-categories/index.html', icon: 'M4 6h16M4 10h16M4 14h16M4 18h16', roles: ['管理員','一般使用者'] },
  { label: '網站管理', href: '../admin-websites/index.html', icon: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9', roles: ['管理員'] },
  { label: '訂單管理', href: '../admin-orders/index.html', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2', roles: ['管理員','一般使用者'] },
  { label: '發票管理', href: '../admin-invoices/index.html', icon: 'M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z', active: true, roles: ['管理員'] },
  { label: '庫存管理', href: '../admin-inventory/index.html', icon: 'M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8', roles: ['管理員','一般使用者'] },
  { label: '使用者管理', href: '../admin-users/index.html', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197', roles: ['管理員'] },
  { label: 'Email模板', href: '../admin-email-templates/index.html', icon: 'M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z', roles: ['管理員'] },
];

const invoiceStatusMap = {
  issued: { label: '已開立', color: 'bg-olive-100 text-olive-700' },
  voided: { label: '已作廢', color: 'bg-gray-100 text-gray-500' },
  allowance: { label: '已折讓', color: 'bg-blue-100 text-blue-700' },
  syncing: { label: '同步中', color: 'bg-yellow-100 text-yellow-700' },
};

const initialInvoices = [
  { id: 'AA-12345678', orderId: 'ORD-20260401-001', site: '春季水果特賣', amount: 2170, status: 'issued', date: '2026-04-01', month: '2026-04' },
  { id: 'AA-12345679', orderId: 'ORD-20260401-002', site: '春季水果特賣', amount: 1800, status: 'issued', date: '2026-04-02', month: '2026-04' },
  { id: 'AA-12345680', orderId: 'ORD-20260402-002', site: '春季水果特賣', amount: 3560, status: 'issued', date: '2026-04-04', month: '2026-04' },
  { id: 'AA-12345681', orderId: 'ORD-20260403-003', site: '年節禮盒專區', amount: 950, status: 'voided', date: '2026-03-28', month: '2026-03' },
  { id: 'AA-12345682', orderId: 'ORD-20260403-004', site: '春季水果特賣', amount: 1200, status: 'allowance', date: '2026-04-03', month: '2026-04' },
  { id: 'AA-12345683', orderId: 'ORD-20260404-001', site: '春季水果特賣', amount: 680, status: 'syncing', date: '2026-04-05', month: '2026-04' },
];

function Sidebar({ items, currentRole, onRoleChange }) {
  const visibleItems = items.filter(item => item.roles.includes(currentRole));
  return (
    <aside className="w-56 bg-olive-900 min-h-screen flex-shrink-0 flex flex-col">
      <div className="p-4 border-b border-olive-800">
        <h1 className="font-display text-lg text-cream-100 font-bold">豐收農場</h1>
        <p className="text-olive-400 text-xs font-body">管理後台</p>
      </div>
      <div className="px-3 py-2 border-b border-olive-800">
        <p className="text-olive-500 text-xs font-body mb-1">目前角色（Prototype）</p>
        <select value={currentRole} onChange={e => onRoleChange(e.target.value)}
          className="w-full text-xs font-body bg-olive-800 text-cream-200 border border-olive-700 rounded px-2 py-1">
          <option value="管理員">管理員</option>
          <option value="一般使用者">一般使用者</option>
        </select>
      </div>
      <nav className="py-2 flex-1">
        {visibleItems.map(item => (
          <a key={item.label} href={item.href}
            className={`sidebar-link flex items-center gap-3 px-4 py-3 font-body text-sm ${item.active ? 'active text-cream-100 font-semibold' : 'text-olive-300 hover:text-cream-100'}`}>
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d={item.icon}/></svg>
            {item.label}
          </a>
        ))}
      </nav>
      <div className="p-4 border-t border-olive-800">
        <a href="../admin-login/index.html" className="flex items-center gap-2 text-olive-400 hover:text-cream-100 font-body text-sm transition-colors">
          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          登出
        </a>
      </div>
    </aside>
  );
}

function App() {
  const [currentRole, setCurrentRole] = useState('管理員');
  const [invoices, setInvoices] = useState(initialInvoices);
  const [filters, setFilters] = useState({ site: '', invoiceId: '', dateFrom: '', dateTo: '', status: '' });
  const [filtered, setFiltered] = useState(initialInvoices);
  const [showVoidDialog, setShowVoidDialog] = useState(null);
  const [showAllowanceDialog, setShowAllowanceDialog] = useState(null);
  const [voidReason, setVoidReason] = useState('');
  const [allowanceAmount, setAllowanceAmount] = useState('');

  const currentMonth = '2026-04';

  const handleSearch = () => {
    let result = [...invoices];
    if (filters.site) result = result.filter(i => i.site === filters.site);
    if (filters.invoiceId) result = result.filter(i => i.id.includes(filters.invoiceId));
    if (filters.status) result = result.filter(i => i.status === filters.status);
    if (filters.dateFrom) result = result.filter(i => i.date >= filters.dateFrom);
    if (filters.dateTo) result = result.filter(i => i.date <= filters.dateTo);
    setFiltered(result);
  };

  const handleVoid = (id) => {
    if (!voidReason.trim()) return;
    setInvoices(prev => prev.map(i => i.id === id ? { ...i, status: 'voided' } : i));
    setFiltered(prev => prev.map(i => i.id === id ? { ...i, status: 'voided' } : i));
    setShowVoidDialog(null);
    setVoidReason('');
  };

  const handleAllowance = (id) => {
    const inv = invoices.find(i => i.id === id);
    const amt = parseInt(allowanceAmount);
    if (!amt || amt <= 0 || amt > inv.amount) return;
    setInvoices(prev => prev.map(i => i.id === id ? { ...i, status: 'allowance' } : i));
    setFiltered(prev => prev.map(i => i.id === id ? { ...i, status: 'allowance' } : i));
    setShowAllowanceDialog(null);
    setAllowanceAmount('');
  };

  const handleResync = (id) => {
    setInvoices(prev => prev.map(i => i.id === id ? { ...i, status: 'issued' } : i));
    setFiltered(prev => prev.map(i => i.id === id ? { ...i, status: 'issued' } : i));
  };

  const canVoid = (inv) => inv.status === 'issued' && inv.month === currentMonth;

  return (
    <div className="flex min-h-screen">
      <Sidebar items={ALL_NAV_ITEMS} currentRole={currentRole} onRoleChange={setCurrentRole} />
      <main className="flex-1 p-6 lg:p-8">
        <div className="mb-6">
          <h2 className="font-display text-2xl text-olive-900 font-bold">發票管理</h2>
          <p className="font-body text-olive-500 text-sm mt-1">查詢發票、執行作廢與折讓操作</p>
        </div>

        {/* Filters */}
        <div className="bg-white rounded-sm border border-cream-300 p-5 mb-6">
          <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
            <div>
              <label className="block font-body text-xs text-olive-500 mb-1">所屬網站</label>
              <select value={filters.site} onChange={e => setFilters({...filters, site: e.target.value})}
                className="w-full border border-cream-300 rounded-sm px-3 py-2 font-body text-sm text-olive-800 bg-cream-50">
                <option value="">全部</option>
                <option>春季水果特賣</option>
                <option>年節禮盒專區</option>
              </select>
            </div>
            <div>
              <label className="block font-body text-xs text-olive-500 mb-1">發票號碼</label>
              <input type="text" value={filters.invoiceId} onChange={e => setFilters({...filters, invoiceId: e.target.value})}
                className="w-full border border-cream-300 rounded-sm px-3 py-2 font-body text-sm text-olive-800 bg-cream-50" placeholder="搜尋號碼" />
            </div>
            <div>
              <label className="block font-body text-xs text-olive-500 mb-1">開立起始日</label>
              <input type="date" value={filters.dateFrom} onChange={e => setFilters({...filters, dateFrom: e.target.value})}
                className="w-full border border-cream-300 rounded-sm px-3 py-2 font-body text-sm text-olive-800 bg-cream-50" />
            </div>
            <div>
              <label className="block font-body text-xs text-olive-500 mb-1">開立結束日</label>
              <input type="date" value={filters.dateTo} onChange={e => setFilters({...filters, dateTo: e.target.value})}
                className="w-full border border-cream-300 rounded-sm px-3 py-2 font-body text-sm text-olive-800 bg-cream-50" />
            </div>
            <div>
              <label className="block font-body text-xs text-olive-500 mb-1">發票狀態</label>
              <div className="flex gap-2">
                <select value={filters.status} onChange={e => setFilters({...filters, status: e.target.value})}
                  className="flex-1 border border-cream-300 rounded-sm px-3 py-2 font-body text-sm text-olive-800 bg-cream-50">
                  <option value="">全部</option>
                  {Object.entries(invoiceStatusMap).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
                <button onClick={handleSearch}
                  className="bg-olive-700 text-white px-4 py-2 rounded-sm font-body font-semibold hover:bg-olive-800 transition-colors text-sm">搜尋</button>
              </div>
            </div>
          </div>
        </div>

        {/* Invoice table */}
        <div className="bg-white rounded-sm border border-cream-300 overflow-hidden">
          <table className="w-full">
            <thead>
              <tr className="bg-cream-100 border-b border-cream-300">
                <th className="text-left px-4 py-3 font-body font-semibold text-olive-700 text-sm">發票號碼</th>
                <th className="text-left px-4 py-3 font-body font-semibold text-olive-700 text-sm">訂單編號</th>
                <th className="text-left px-4 py-3 font-body font-semibold text-olive-700 text-sm">網站</th>
                <th className="text-right px-4 py-3 font-body font-semibold text-olive-700 text-sm">金額</th>
                <th className="text-center px-4 py-3 font-body font-semibold text-olive-700 text-sm">狀態</th>
                <th className="text-center px-4 py-3 font-body font-semibold text-olive-700 text-sm">開立日期</th>
                <th className="text-center px-4 py-3 font-body font-semibold text-olive-700 text-sm">操作</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(inv => (
                <tr key={inv.id} className="border-b border-cream-200 hover:bg-cream-50 transition-colors">
                  <td className="px-4 py-3 font-body text-sm font-medium text-olive-800">{inv.id}</td>
                  <td className="px-4 py-3 font-body text-sm text-olive-600">{inv.orderId}</td>
                  <td className="px-4 py-3 font-body text-sm text-olive-600">{inv.site}</td>
                  <td className="px-4 py-3 text-right font-body text-sm font-semibold text-olive-800">NT${inv.amount.toLocaleString()}</td>
                  <td className="px-4 py-3 text-center">
                    <span className={`inline-block px-3 py-1 text-xs font-body font-semibold rounded-sm ${invoiceStatusMap[inv.status].color}`}>
                      {invoiceStatusMap[inv.status].label}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-center font-body text-sm text-olive-600">{inv.date}</td>
                  <td className="px-4 py-3 text-center">
                    <div className="flex justify-center gap-2">
                      {canVoid(inv) && (
                        <button onClick={() => setShowVoidDialog(inv.id)} className="text-terra-500 hover:text-terra-700 font-body text-sm underline">作廢</button>
                      )}
                      {inv.status === 'issued' && (
                        <button onClick={() => { setShowAllowanceDialog(inv.id); setAllowanceAmount(''); }}
                          className="text-olive-600 hover:text-olive-800 font-body text-sm underline">折讓</button>
                      )}
                      {inv.status === 'syncing' && (
                        <button onClick={() => handleResync(inv.id)} className="text-blue-600 hover:text-blue-800 font-body text-sm underline">重新同步</button>
                      )}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          <div className="px-4 py-3 bg-cream-50 border-t border-cream-200 flex items-center justify-between">
            <p className="font-body text-sm text-olive-500">共 {filtered.length} 筆發票</p>
            <p className="font-body text-sm text-olive-400">每頁 20 筆（最大 100 筆）</p>
          </div>
        </div>

        {/* Void dialog */}
        {showVoidDialog && (
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
            <div className="bg-white rounded-sm p-6 max-w-sm w-full mx-4 border border-cream-300 shadow-xl">
              <h3 className="font-display text-lg text-olive-800 font-semibold mb-3">作廢發票</h3>
              <p className="font-body text-olive-600 mb-4 text-sm">確定要作廢發票 {showVoidDialog} 嗎？僅「已開立」且同月份可作廢。</p>
              <div className="mb-4">
                <label className="block font-body text-sm text-olive-700 mb-1">作廢原因 <span className="text-terra-500">*</span></label>
                <textarea value={voidReason} onChange={e => setVoidReason(e.target.value)}
                  className="w-full border border-cream-300 rounded-sm px-3 py-2 font-body text-olive-800 bg-cream-50 h-20 resize-none"
                  placeholder="請輸入作廢原因" />
              </div>
              <div className="flex gap-3 justify-end">
                <button onClick={() => { setShowVoidDialog(null); setVoidReason(''); }} className="px-5 py-2 rounded-sm font-body border border-cream-300 text-olive-600 hover:bg-cream-100 transition-colors">取消</button>
                <button onClick={() => handleVoid(showVoidDialog)} disabled={!voidReason.trim()} className="px-5 py-2 rounded-sm font-body bg-terra-500 text-white hover:bg-terra-600 transition-colors disabled:bg-gray-300 disabled:text-gray-500">確認作廢</button>
              </div>
            </div>
          </div>
        )}

        {/* Allowance dialog */}
        {showAllowanceDialog && (
          <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
            <div className="bg-white rounded-sm p-6 max-w-sm w-full mx-4 border border-cream-300 shadow-xl">
              <h3 className="font-display text-lg text-olive-800 font-semibold mb-3">折讓發票</h3>
              <p className="font-body text-olive-600 mb-4 text-sm">
                發票 {showAllowanceDialog}，原金額 NT${invoices.find(i => i.id === showAllowanceDialog)?.amount.toLocaleString()}
              </p>
              <div className="mb-4">
                <label className="block font-body text-sm text-olive-700 mb-1">折讓金額 <span className="text-terra-500">*</span></label>
                <input type="number" value={allowanceAmount} onChange={e => setAllowanceAmount(e.target.value)}
                  className="w-full border border-cream-300 rounded-sm px-3 py-2 font-body text-olive-800 bg-cream-50"
                  placeholder="不超過原發票金額" min="1" max={invoices.find(i => i.id === showAllowanceDialog)?.amount} />
              </div>
              <div className="flex gap-3 justify-end">
                <button onClick={() => { setShowAllowanceDialog(null); setAllowanceAmount(''); }} className="px-5 py-2 rounded-sm font-body border border-cream-300 text-olive-600 hover:bg-cream-100 transition-colors">取消</button>
                <button onClick={() => handleAllowance(showAllowanceDialog)} disabled={!allowanceAmount} className="px-5 py-2 rounded-sm font-body bg-olive-700 text-white hover:bg-olive-800 transition-colors disabled:bg-gray-300 disabled:text-gray-500">確認折讓</button>
              </div>
            </div>
          </div>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
