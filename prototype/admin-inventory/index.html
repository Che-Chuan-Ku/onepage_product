<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>後台庫存管理頁 Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        olive: { 50:'#f7f8f0', 100:'#eef0e1', 200:'#dce1c3', 300:'#c4cc9a', 400:'#a8b36e', 500:'#8d9a4f', 600:'#6e7b3b', 700:'#4A5D23', 800:'#3d4c1f', 900:'#2e3a17' },
        terra: { 50:'#fdf5f2', 100:'#fbe8e0', 200:'#f5cfc0', 300:'#edae96', 400:'#e28a6a', 500:'#C75B39', 600:'#b74a2c', 700:'#993d25', 800:'#7d3422', 900:'#6a2e20' },
        cream: { 50:'#FEFDFB', 100:'#FAF7F2', 200:'#F5EFE6', 300:'#EDE4D4' }
      },
      fontFamily: {
        display: ['Playfair Display', 'serif'],
        body: ['Source Sans 3', 'sans-serif']
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #FAF7F2; }
  input:focus { outline: none; box-shadow: 0 0 0 2px #4A5D23; }
  .sidebar-link { transition: all 0.2s; }
  .sidebar-link:hover { background: rgba(74,93,35,0.1); }
  .sidebar-link.active { background: rgba(74,93,35,0.15); border-right: 3px solid #4A5D23; }
  .save-flash { animation: flash 0.5s ease; }
  @keyframes flash { 0% { background: #eef0e1; } 100% { background: transparent; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

// REQ-034: RBAC 側邊選單
const ALL_NAV_ITEMS = [
  { label: '商品管理', href: '../admin-products/index.html', icon: 'M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4', roles: ['管理員','一般使用者'] },
  { label: '商品類型', href: '../admin-categories/index.html', icon: 'M4 6h16M4 10h16M4 14h16M4 18h16', roles: ['管理員','一般使用者'] },
  { label: '網站管理', href: '../admin-websites/index.html', icon: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9', roles: ['管理員'] },
  { label: '訂單管理', href: '../admin-orders/index.html', icon: 'M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2', roles: ['管理員','一般使用者'] },
  { label: '發票管理', href: '../admin-invoices/index.html', icon: 'M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z', roles: ['管理員'] },
  { label: '庫存管理', href: '../admin-inventory/index.html', icon: 'M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8', active: true, roles: ['管理員','一般使用者'] },
  { label: '使用者管理', href: '../admin-users/index.html', icon: 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197', roles: ['管理員'] },
  { label: 'Email模板', href: '../admin-email-templates/index.html', icon: 'M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z', roles: ['管理員'] },
];

function Sidebar({ items, currentRole, onRoleChange }) {
  const visibleItems = items.filter(item => item.roles.includes(currentRole));
  return (
    <aside className="w-56 bg-olive-900 min-h-screen flex-shrink-0 flex flex-col">
      <div className="p-4 border-b border-olive-800">
        <h1 className="font-display text-lg text-cream-100 font-bold">豐收農場</h1>
        <p className="text-olive-400 text-xs font-body">管理後台</p>
      </div>
      <div className="px-3 py-2 border-b border-olive-800">
        <p className="text-olive-500 text-xs font-body mb-1">目前角色（Prototype）</p>
        <select value={currentRole} onChange={e => onRoleChange(e.target.value)}
          className="w-full text-xs font-body bg-olive-800 text-cream-200 border border-olive-700 rounded px-2 py-1">
          <option value="管理員">管理員</option>
          <option value="一般使用者">一般使用者</option>
        </select>
      </div>
      <nav className="py-2 flex-1">
        {visibleItems.map(item => (
          <a key={item.label} href={item.href}
            className={`sidebar-link flex items-center gap-3 px-4 py-3 font-body text-sm ${item.active ? 'active text-cream-100 font-semibold' : 'text-olive-300 hover:text-cream-100'}`}>
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d={item.icon}/></svg>
            {item.label}
          </a>
        ))}
      </nav>
      <div className="p-4 border-t border-olive-800">
        <a href="../admin-login/index.html" className="flex items-center gap-2 text-olive-400 hover:text-cream-100 font-body text-sm transition-colors">
          <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          登出
        </a>
      </div>
    </aside>
  );
}

function App() {
  const [inventory, setInventory] = useState([
    { id: 1, name: '頂級蜜蘋果', stock: 45, threshold: 10 },
    { id: 2, name: '愛文芒果', stock: 8, threshold: 10 },
    { id: 3, name: '台灣香菇乾', stock: 120, threshold: 15 },
    { id: 4, name: '精選水果禮盒組合', stock: 25, threshold: 5 },
    { id: 5, name: '有機香蕉', stock: 3, threshold: 10 },
    { id: 6, name: '龍眼乾', stock: 80, threshold: 10 },
  ]);

  const [savedId, setSavedId] = useState(null);

  const updateStock = useCallback((id, value) => {
    const num = Math.max(0, parseInt(value) || 0);
    setInventory(prev => prev.map(item => item.id === id ? { ...item, stock: num } : item));
    setSavedId(id);
    setTimeout(() => setSavedId(null), 600);
  }, []);

  const updateThreshold = useCallback((id, value) => {
    const num = Math.max(0, parseInt(value) || 0);
    setInventory(prev => prev.map(item => item.id === id ? { ...item, threshold: num } : item));
    setSavedId(id);
    setTimeout(() => setSavedId(null), 600);
  }, []);

  const [currentRole, setCurrentRole] = React.useState('管理員');
  const lowStockCount = inventory.filter(i => i.stock <= i.threshold).length;

  return (
    <div className="flex min-h-screen">
      <Sidebar items={ALL_NAV_ITEMS} currentRole={currentRole} onRoleChange={setCurrentRole} />
      <main className="flex-1 p-6 lg:p-8">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="font-display text-2xl text-olive-900 font-bold">庫存管理</h2>
            <p className="font-body text-olive-500 text-sm mt-1">查看與編輯庫存、設定低庫存門檻</p>
          </div>
          {lowStockCount > 0 && (
            <div className="bg-terra-50 border border-terra-200 px-4 py-2 rounded-sm flex items-center gap-2">
              <svg width="18" height="18" fill="none" stroke="#C75B39" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.29 3.86l-8.3 14.32A2 2 0 003.72 21h16.56a2 2 0 001.73-2.82l-8.3-14.32a2 2 0 00-3.42 0z"/></svg>
              <span className="font-body text-terra-700 text-sm font-semibold">{lowStockCount} 項商品低庫存</span>
            </div>
          )}
        </div>

        <div className="bg-white rounded-sm border border-cream-300 overflow-hidden">
          <table className="w-full">
            <thead>
              <tr className="bg-cream-100 border-b border-cream-300">
                <th className="text-left px-6 py-3 font-body font-semibold text-olive-700 text-sm">商品名稱</th>
                <th className="text-center px-6 py-3 font-body font-semibold text-olive-700 text-sm">目前庫存數量</th>
                <th className="text-center px-6 py-3 font-body font-semibold text-olive-700 text-sm">低庫存門檻</th>
                <th className="text-center px-6 py-3 font-body font-semibold text-olive-700 text-sm">狀態</th>
              </tr>
            </thead>
            <tbody>
              {inventory.map(item => {
                const isLow = item.stock <= item.threshold;
                return (
                  <tr key={item.id} className={`border-b border-cream-200 transition-colors ${savedId === item.id ? 'save-flash' : ''} ${isLow ? 'bg-terra-50/30' : 'hover:bg-cream-50'}`}>
                    <td className="px-6 py-4">
                      <span className="font-body font-semibold text-olive-800">{item.name}</span>
                    </td>
                    <td className="px-6 py-4 text-center">
                      <input
                        type="number"
                        min="0"
                        value={item.stock}
                        onChange={e => updateStock(item.id, e.target.value)}
                        className={`w-24 text-center border rounded-sm px-3 py-2 font-body font-semibold bg-cream-50 ${isLow ? 'border-terra-300 text-terra-600' : 'border-cream-300 text-olive-800'}`}
                      />
                    </td>
                    <td className="px-6 py-4 text-center">
                      <input
                        type="number"
                        min="0"
                        value={item.threshold}
                        onChange={e => updateThreshold(item.id, e.target.value)}
                        className="w-24 text-center border border-cream-300 rounded-sm px-3 py-2 font-body text-olive-800 bg-cream-50"
                      />
                    </td>
                    <td className="px-6 py-4 text-center">
                      {isLow ? (
                        <span className="inline-flex items-center gap-1 bg-terra-100 text-terra-700 px-3 py-1 text-xs font-body font-semibold rounded-sm">
                          <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/></svg>
                          低庫存
                        </span>
                      ) : (
                        <span className="inline-block bg-olive-100 text-olive-700 px-3 py-1 text-xs font-body font-semibold rounded-sm">正常</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <p className="font-body text-olive-400 text-sm mt-4">提示：修改庫存數量或門檻後即時儲存。以商品為單位（無 SKU 層級）。</p>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
