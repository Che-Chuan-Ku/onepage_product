<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>購物車頁 Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        olive: { 50:'#f7f8f0', 100:'#eef0e1', 200:'#dce1c3', 300:'#c4cc9a', 400:'#a8b36e', 500:'#8d9a4f', 600:'#6e7b3b', 700:'#4A5D23', 800:'#3d4c1f', 900:'#2e3a17' },
        terra: { 50:'#fdf5f2', 100:'#fbe8e0', 200:'#f5cfc0', 300:'#edae96', 400:'#e28a6a', 500:'#C75B39', 600:'#b74a2c', 700:'#993d25', 800:'#7d3422', 900:'#6a2e20' },
        cream: { 50:'#FEFDFB', 100:'#FAF7F2', 200:'#F5EFE6', 300:'#EDE4D4' }
      },
      fontFamily: {
        display: ['Playfair Display', 'serif'],
        body: ['Source Sans 3', 'sans-serif']
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #FAF7F2; }
  .noise-overlay { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }
  .slide-in { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
  .qty-btn { user-select: none; -webkit-user-select: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const FREE_SHIPPING_THRESHOLD = 1500;
const SHIPPING_FEE = 150;

const initialItems = [
  { id: 1, name: '頂級蜜蘋果', packaging: '6入禮盒', price: 680, quantity: 2, image: 'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=160&h=160&fit=crop', isPreorder: false },
  { id: 2, name: '台灣香菇乾', packaging: '300g', price: 450, quantity: 1, image: 'https://images.unsplash.com/photo-1504545102780-26774c1bb073?w=160&h=160&fit=crop', isPreorder: false },
  { id: 3, name: '有機香蕉', packaging: '一串（約6根）', price: 120, quantity: 3, image: 'https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=160&h=160&fit=crop', isPreorder: false },
];

// REQ-031: 商品列表行（圖左、名稱+單價中、數量調整、小計、刪除）
function CartRow({ item, onUpdateQuantity, onRemove }) {
  const subtotal = item.price * item.quantity;
  return (
    <div className="flex items-center gap-4 py-5 border-b border-cream-300 slide-in group">
      {/* 圖片（左） */}
      <div className="w-18 h-18 lg:w-20 lg:h-20 flex-shrink-0 rounded-sm overflow-hidden bg-cream-200 border border-cream-300" style={{width:'72px',height:'72px'}}>
        <img src={item.image} alt={item.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
      </div>

      {/* 名稱 + 單價（中） */}
      <div className="flex-1 min-w-0">
        <h3 className="font-body font-semibold text-olive-900 text-base leading-snug truncate">{item.name}</h3>
        <p className="font-body text-olive-500 text-sm mt-0.5">{item.packaging}</p>
        <p className="font-body text-terra-600 font-semibold text-sm mt-1">NT${item.price.toLocaleString()}</p>
      </div>

      {/* 數量調整（+/-） */}
      <div className="flex items-center gap-1 flex-shrink-0">
        <button
          className="qty-btn w-8 h-8 flex items-center justify-center bg-cream-200 hover:bg-cream-300 text-olive-700 rounded-sm transition-colors font-bold text-base"
          onClick={() => onUpdateQuantity(item.id, item.quantity - 1)}
        >-</button>
        <span className="w-10 text-center font-body font-semibold text-olive-800">{item.quantity}</span>
        <button
          className="qty-btn w-8 h-8 flex items-center justify-center bg-cream-200 hover:bg-cream-300 text-olive-700 rounded-sm transition-colors font-bold text-base"
          onClick={() => onUpdateQuantity(item.id, item.quantity + 1)}
        >+</button>
      </div>

      {/* 小計（右對齊） */}
      <div className="w-24 text-right flex-shrink-0">
        <p className="font-display text-base text-olive-900 font-bold">NT${subtotal.toLocaleString()}</p>
      </div>

      {/* 刪除按鈕 */}
      <button
        onClick={() => onRemove(item.id)}
        className="p-1.5 text-gray-400 hover:text-terra-500 transition-colors flex-shrink-0"
        title="刪除"
      >
        <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  );
}

function App() {
  const [items, setItems] = useState(initialItems);
  const [mixError, setMixError] = useState('');

  const updateQuantity = useCallback((id, newQty) => {
    if (newQty <= 0) {
      setItems(prev => prev.filter(item => item.id !== id));
    } else {
      setItems(prev => prev.map(item => item.id === id ? { ...item, quantity: newQty } : item));
    }
  }, []);

  const removeItem = useCallback((id) => {
    setItems(prev => prev.filter(item => item.id !== id));
  }, []);

  const subtotal = items.reduce((sum, item) => sum + item.price * item.quantity, 0);
  const shippingFee = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_FEE;
  const total = subtotal + shippingFee;
  const hasPreorderMix = items.some(i => i.isPreorder) && items.some(i => !i.isPreorder);
  const freeShippingDiff = FREE_SHIPPING_THRESHOLD - subtotal;

  return (
    <div className="min-h-screen bg-cream-100 noise-overlay flex flex-col">
      {/* Header */}
      <header className="bg-olive-800 text-white py-4 flex-shrink-0">
        <div className="max-w-3xl mx-auto px-4 flex items-center justify-between">
          <h1 className="font-display text-xl font-bold">購物車</h1>
          <a href="../storefront/index.html" className="font-body text-cream-200 hover:text-white transition-colors flex items-center gap-1 text-sm">
            <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            繼續購物
          </a>
        </div>
      </header>

      <div className="flex-1 max-w-3xl mx-auto w-full px-4 py-8">
        {items.length === 0 ? (
          <div className="text-center py-20">
            <div className="w-20 h-20 mx-auto mb-5 bg-cream-200 rounded-full flex items-center justify-center">
              <svg width="36" height="36" fill="none" stroke="#8d9a4f" strokeWidth="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0"/></svg>
            </div>
            <h2 className="font-display text-2xl text-olive-800 mb-2">購物車是空的</h2>
            <p className="font-body text-olive-500 mb-6 text-sm">快去挑選新鮮好物吧</p>
            <a href="../storefront/index.html" className="inline-block bg-terra-500 text-white px-8 py-3 rounded-sm font-body font-semibold hover:bg-terra-600 transition-colors">
              瀏覽商品
            </a>
          </div>
        ) : (
          <>
            {/* REQ-031: 預購混合警告 */}
            {hasPreorderMix && (
              <div className="bg-terra-50 border border-terra-200 p-4 rounded-sm mb-5 flex items-start gap-3">
                <svg width="18" height="18" fill="none" stroke="#C75B39" strokeWidth="2" viewBox="0 0 24 24" className="flex-shrink-0 mt-0.5"><path d="M12 9v4M12 17h.01M10.29 3.86l-8.3 14.32A2 2 0 003.72 21h16.56a2 2 0 001.73-2.82l-8.3-14.32a2 2 0 00-3.42 0z"/></svg>
                <p className="font-body text-terra-700 text-sm">預購商品不可與一般商品混合結帳，請分開下單。</p>
              </div>
            )}

            {/* REQ-031: 商品列表（圖左、名稱+單價中、數量、小計、刪除） */}
            <div className="bg-white rounded-sm border border-cream-300 px-5 mb-4">
              <div className="hidden lg:flex items-center py-3 border-b border-cream-200 text-xs text-olive-400 font-body uppercase tracking-widest">
                <div style={{width:'72px'}} className="flex-shrink-0 mr-4">圖片</div>
                <span className="flex-1">商品</span>
                <span className="w-28 text-center">數量</span>
                <span className="w-24 text-right">小計</span>
                <span className="w-8 ml-1.5"></span>
              </div>
              {items.map(item => (
                <CartRow key={item.id} item={item} onUpdateQuantity={updateQuantity} onRemove={removeItem} />
              ))}
            </div>

            {/* REQ-031: 運費預估顯示 */}
            <div className={`rounded-sm px-5 py-3 mb-4 border text-sm font-body flex items-center gap-2 ${shippingFee === 0 ? 'bg-olive-50 border-olive-200 text-olive-700' : 'bg-cream-100 border-cream-300 text-olive-600'}`}>
              <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3m-2 10a2 2 0 100-4 2 2 0 000 4zm6 0a2 2 0 100-4 2 2 0 000 4zM13 7l4 0 4 4v4h-8v-8z"/></svg>
              {shippingFee === 0
                ? <span>已達免運門檻，享免運費！</span>
                : <span>還差 <strong className="text-terra-600">NT${freeShippingDiff.toLocaleString()}</strong> 即可享免運費（門檻 NT${FREE_SHIPPING_THRESHOLD.toLocaleString()}）</span>
              }
            </div>

            {/* REQ-031: 小計與總計金額（右下對齊） */}
            <div className="bg-white rounded-sm border border-cream-300 px-5 py-4 mb-6">
              <div className="space-y-2 font-body text-sm">
                <div className="flex justify-between text-olive-600">
                  <span>商品小計</span>
                  <span className="font-semibold">NT${subtotal.toLocaleString()}</span>
                </div>
                <div className="flex justify-between text-olive-600">
                  <span>運費</span>
                  <span className={shippingFee === 0 ? 'text-olive-600 font-semibold' : 'font-semibold'}>
                    {shippingFee === 0 ? '免運費' : `NT$${shippingFee}`}
                  </span>
                </div>
                <div className="border-t border-cream-200 pt-3 flex justify-between items-baseline">
                  <span className="font-semibold text-olive-800 text-base">總計</span>
                  <span className="font-display text-2xl text-terra-600 font-bold">NT${total.toLocaleString()}</span>
                </div>
              </div>
            </div>

            {/* REQ-031: 前往結帳按鈕（固定於頁面底部） */}
            {mixError && <p className="text-terra-500 text-sm font-body mb-2 text-center">{mixError}</p>}
          </>
        )}
      </div>

      {/* 前往結帳 固定底部按鈕 */}
      {items.length > 0 && (
        <div className="sticky bottom-0 bg-white border-t border-cream-300 px-4 py-4 shadow-lg">
          <div className="max-w-3xl mx-auto">
            <a
              href={hasPreorderMix ? '#' : '../checkout/index.html'}
              onClick={e => { if (hasPreorderMix) { e.preventDefault(); setMixError('請先移除預購或一般商品'); }}}
              className={`block w-full py-4 rounded-sm font-body font-semibold text-lg tracking-wider text-center transition-all ${hasPreorderMix ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-terra-500 text-white hover:bg-terra-600 hover:shadow-lg'}`}
            >
              前往結帳
            </a>
          </div>
        </div>
      )}

      {/* REQ-035: OnePage 平台 Footer */}
      <footer className="bg-white border-t-2 border-cream-300 py-4 mt-auto flex-shrink-0">
        <div className="max-w-3xl mx-auto px-4 flex items-center justify-between">
          <p className="font-body text-olive-400 text-xs">由 OnePage 提供技術支援</p>
          <a
            href="https://onepage.example.com/contact"
            target="_blank"
            rel="noopener noreferrer"
            className="font-body text-olive-500 hover:text-olive-700 text-xs underline transition-colors"
          >
            聯絡我們
          </a>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
