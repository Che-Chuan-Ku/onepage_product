<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>結帳頁 Prototype</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        olive: { 50:'#f7f8f0', 100:'#eef0e1', 200:'#dce1c3', 300:'#c4cc9a', 400:'#a8b36e', 500:'#8d9a4f', 600:'#6e7b3b', 700:'#4A5D23', 800:'#3d4c1f', 900:'#2e3a17' },
        terra: { 50:'#fdf5f2', 100:'#fbe8e0', 200:'#f5cfc0', 300:'#edae96', 400:'#e28a6a', 500:'#C75B39', 600:'#b74a2c', 700:'#993d25', 800:'#7d3422', 900:'#6a2e20' },
        cream: { 50:'#FEFDFB', 100:'#FAF7F2', 200:'#F5EFE6', 300:'#EDE4D4' }
      },
      fontFamily: {
        display: ['Playfair Display', 'serif'],
        body: ['Source Sans 3', 'sans-serif']
      }
    }
  }
}
</script>
<style>
  body { font-family: 'Source Sans 3', sans-serif; background: #FAF7F2; }
  .noise-overlay { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); }
  input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px #4A5D23; }
  .field-error { border-color: #C75B39 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const orderItems = [
  { name: '頂級蜜蘋果', packaging: '6入禮盒', price: 680, quantity: 2 },
  { name: '台灣香菇乾', packaging: '300g', price: 450, quantity: 1 },
  { name: '有機香蕉', packaging: '一串（約6根）', price: 120, quantity: 3 },
];

const counties = ['台北市','新北市','桃園市','台中市','台南市','高雄市','基隆市','新竹市','新竹縣','苗栗縣','彰化縣','南投縣','雲林縣','嘉義市','嘉義縣','屏東縣','宜蘭縣','花蓮縣','台東縣'];
const outerIslands = ['澎湖縣','金門縣','連江縣'];
const allCounties = [...counties, ...outerIslands];

const districts = {
  '台北市': ['中正區','大同區','中山區','松山區','大安區','萬華區','信義區','士林區','北投區','內湖區','南港區','文山區'],
  '新北市': ['板橋區','中和區','永和區','新莊區','三重區','土城區','蘆洲區','新店區','汐止區','樹林區'],
  '台中市': ['中區','東區','南區','西區','北區','北屯區','西屯區','南屯區','太平區','大里區'],
};

function FormField({ label, required, error, children }) {
  return (
    <div className="mb-5">
      <label className="block font-body font-semibold text-olive-800 mb-1.5">
        {label} {required && <span className="text-terra-500">*</span>}
      </label>
      {children}
      {error && <p className="text-terra-500 text-sm font-body mt-1">{error}</p>}
    </div>
  );
}

function App() {
  const [form, setForm] = useState({
    name: '', county: '', district: '', address: '', phone: '', email: '', note: '', taxId: '', shipping: 'delivery'
  });
  const [errors, setErrors] = useState({});
  const [shipping, setShipping] = useState(150);
  const [isOuterIsland, setIsOuterIsland] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const subtotal = orderItems.reduce((s, i) => s + i.price * i.quantity, 0);
  const freeShippingThreshold = 1500;

  useEffect(() => {
    if (form.shipping === 'pickup') {
      setShipping(0);
      setIsOuterIsland(false);
    } else if (outerIslands.includes(form.county)) {
      setIsOuterIsland(true);
      setShipping(0);
    } else if (subtotal >= freeShippingThreshold) {
      setShipping(0);
      setIsOuterIsland(false);
    } else {
      setShipping(150);
      setIsOuterIsland(false);
    }
  }, [form.county, form.shipping, subtotal]);

  const total = subtotal + shipping;

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = '請輸入姓名';
    if (!form.phone.trim()) e.phone = '請輸入電話';
    if (!form.email.trim()) e.email = '請輸入 Email';
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) e.email = 'Email 格式不正確';
    if (form.taxId && !/^\d{8}$/.test(form.taxId)) e.taxId = '統一編號需為 8 碼數字';
    if (form.shipping === 'delivery') {
      if (!form.county) e.county = '請選擇縣市';
      if (!form.address.trim()) e.address = '請輸入詳細地址';
    }
    return e;
  };

  const handleSubmit = () => {
    const e = validate();
    setErrors(e);
    if (Object.keys(e).length === 0 && !isOuterIsland) {
      setSubmitted(true);
    }
  };

  const updateField = (field, value) => {
    setForm(prev => ({ ...prev, [field]: value }));
    if (errors[field]) setErrors(prev => ({ ...prev, [field]: undefined }));
  };

  if (submitted) {
    return (
      <div className="min-h-screen bg-cream-100 noise-overlay flex items-center justify-center p-4">
        <div className="bg-white rounded-sm p-10 border border-cream-300 max-w-md w-full text-center">
          <div className="w-16 h-16 mx-auto mb-4 bg-olive-100 rounded-full flex items-center justify-center">
            <svg width="32" height="32" fill="none" stroke="#4A5D23" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
          <h2 className="font-display text-2xl text-olive-800 font-bold mb-2">訂單已送出</h2>
          <p className="font-body text-olive-600 mb-6">即將導向付款頁面...</p>
          <a href="../payment/index.html" className="inline-block bg-terra-500 text-white px-8 py-3 rounded-sm font-body font-semibold hover:bg-terra-600 transition-colors">
            前往付款
          </a>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-cream-100 noise-overlay">
      <header className="bg-olive-800 text-white py-4">
        <div className="max-w-5xl mx-auto px-4 flex items-center justify-between">
          <h1 className="font-display text-2xl font-bold">結帳</h1>
          <a href="../cart/index.html" className="font-body text-cream-200 hover:text-white transition-colors flex items-center gap-1">
            <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
            返回購物車
          </a>
        </div>
      </header>

      <div className="max-w-5xl mx-auto px-4 py-8 lg:py-12 pb-4">
        <div className="grid grid-cols-1 lg:grid-cols-5 gap-8">
          {/* Form */}
          <div className="lg:col-span-3">
            <div className="bg-white rounded-sm p-6 lg:p-8 border border-cream-300">
              <h2 className="font-display text-xl text-olive-800 font-semibold mb-6 pb-3 border-b border-cream-200">收件資訊</h2>

              <FormField label="姓名" required error={errors.name}>
                <input type="text" value={form.name} onChange={e => updateField('name', e.target.value)}
                  className={`w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 ${errors.name ? 'field-error' : ''}`}
                  placeholder="收件人姓名" />
              </FormField>

              {/* Shipping method */}
              <FormField label="運送方式" required>
                <div className="flex gap-4">
                  {[['delivery','宅配'],['pickup','自取']].map(([val,label]) => (
                    <label key={val} className={`flex-1 p-4 rounded-sm border-2 cursor-pointer transition-all text-center ${form.shipping === val ? 'border-olive-700 bg-olive-50' : 'border-cream-300 bg-white hover:border-olive-300'}`}>
                      <input type="radio" name="shipping" value={val} checked={form.shipping === val} onChange={e => updateField('shipping', e.target.value)} className="sr-only" />
                      <span className="font-body font-semibold text-olive-800">{label}</span>
                      <span className="block text-sm text-olive-500 mt-0.5">{val === 'pickup' ? '免運費' : '依地址計算'}</span>
                    </label>
                  ))}
                </div>
              </FormField>

              {form.shipping === 'delivery' && (
                <>
                  <div className="grid grid-cols-2 gap-4">
                    <FormField label="縣市" required error={errors.county}>
                      <select value={form.county} onChange={e => { updateField('county', e.target.value); updateField('district', ''); }}
                        className={`w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 ${errors.county ? 'field-error' : ''}`}>
                        <option value="">請選擇</option>
                        {allCounties.map(c => <option key={c} value={c}>{c}</option>)}
                      </select>
                    </FormField>
                    <FormField label="區域">
                      <select value={form.district} onChange={e => updateField('district', e.target.value)}
                        className="w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50">
                        <option value="">請選擇</option>
                        {(districts[form.county] || []).map(d => <option key={d} value={d}>{d}</option>)}
                      </select>
                    </FormField>
                  </div>
                  <FormField label="詳細地址" required error={errors.address}>
                    <input type="text" value={form.address} onChange={e => updateField('address', e.target.value)}
                      className={`w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 ${errors.address ? 'field-error' : ''}`}
                      placeholder="街道巷弄門牌號" />
                  </FormField>
                </>
              )}

              {isOuterIsland && (
                <div className="bg-terra-50 border border-terra-200 p-4 rounded-sm mb-5 flex items-start gap-3">
                  <svg width="20" height="20" fill="none" stroke="#C75B39" strokeWidth="2" viewBox="0 0 24 24" className="flex-shrink-0 mt-0.5"><path d="M12 9v4M12 17h.01M10.29 3.86l-8.3 14.32A2 2 0 003.72 21h16.56a2 2 0 001.73-2.82l-8.3-14.32a2 2 0 00-3.42 0z"/></svg>
                  <p className="font-body text-terra-700">不支援外島運送。請選擇自取或更換地址。</p>
                </div>
              )}

              <FormField label="電話" required error={errors.phone}>
                <input type="tel" value={form.phone} onChange={e => updateField('phone', e.target.value)}
                  className={`w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 ${errors.phone ? 'field-error' : ''}`}
                  placeholder="09xx-xxx-xxx" />
              </FormField>

              <FormField label="Email" required error={errors.email}>
                <input type="email" value={form.email} onChange={e => updateField('email', e.target.value)}
                  className={`w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 ${errors.email ? 'field-error' : ''}`}
                  placeholder="your@email.com" />
              </FormField>

              <FormField label="統一編號" error={errors.taxId}>
                <input type="text" value={form.taxId} onChange={e => updateField('taxId', e.target.value)}
                  className={`w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 ${errors.taxId ? 'field-error' : ''}`}
                  placeholder="選填，8 碼數字" maxLength={8} />
              </FormField>

              <FormField label="備註">
                <textarea value={form.note} onChange={e => updateField('note', e.target.value)}
                  className="w-full border border-cream-300 rounded-sm px-4 py-2.5 font-body text-olive-800 bg-cream-50 h-24 resize-none"
                  placeholder="有任何特殊需求請在此註明" />
              </FormField>
            </div>
          </div>

          {/* Order summary */}
          <div className="lg:col-span-2">
            <div className="bg-white rounded-sm p-6 border border-cream-300 sticky top-8">
              <h2 className="font-display text-xl text-olive-800 font-semibold mb-6 pb-3 border-b border-cream-200">訂單商品摘要</h2>
              <div className="space-y-4 mb-6">
                {orderItems.map((item, i) => (
                  <div key={i} className="flex justify-between items-center font-body text-sm">
                    <div>
                      <p className="text-olive-800 font-medium">{item.name}</p>
                      <p className="text-olive-500">{item.packaging} x {item.quantity}</p>
                    </div>
                    <span className="text-olive-700 font-semibold">NT${(item.price * item.quantity).toLocaleString()}</span>
                  </div>
                ))}
              </div>
              <div className="border-t border-cream-200 pt-4 space-y-2 font-body">
                <div className="flex justify-between text-olive-600">
                  <span>商品小計</span>
                  <span>NT${subtotal.toLocaleString()}</span>
                </div>
                <div className="flex justify-between text-olive-600">
                  <span>運費</span>
                  <span className={shipping === 0 ? 'text-olive-500 font-semibold' : ''}>{shipping === 0 ? '免運費' : `NT$${shipping}`}</span>
                </div>
                {shipping > 0 && subtotal < freeShippingThreshold && (
                  <p className="text-xs text-olive-400">滿 NT$1,500 免運</p>
                )}
                <div className="border-t border-cream-200 pt-3 flex justify-between items-baseline">
                  <span className="font-semibold text-olive-800">總計</span>
                  <span className="font-display text-2xl text-terra-600 font-bold">NT${total.toLocaleString()}</span>
                </div>
              </div>
              <button
                onClick={handleSubmit}
                disabled={isOuterIsland}
                className={`w-full mt-6 py-4 rounded-sm font-body font-semibold text-lg tracking-wider transition-all ${isOuterIsland ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-terra-500 text-white hover:bg-terra-600 hover:shadow-lg active:scale-[0.98]'}`}
              >
                送出訂單
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* REQ-035: OnePage 平台 Footer */}
      <div className="border-t-2 border-cream-300 mt-8 py-4">
        <div className="max-w-5xl mx-auto px-4 flex items-center justify-between">
          <p className="font-body text-olive-400 text-xs">由 OnePage 提供技術支援</p>
          <a
            href="https://onepage.example.com/contact"
            target="_blank"
            rel="noopener noreferrer"
            className="font-body text-olive-500 hover:text-olive-700 text-xs underline transition-colors"
          >
            聯絡我們
          </a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
