services:
  - type: web
    name: onepage-product
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: onepage-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: onepage-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: onepage-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: onepage-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: onepage-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JVM_OPTS
        value: "-Xmx300m -Xms128m"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
        value: "https://onepage-product.onrender.com"
      - key: MAIL_HOST
        value: "smtp.gmail.com"
      - key: MAIL_PORT
        value: "465"
      - key: MAIL_USERNAME
        value: "kksjkdkk9933@gmail.com"
      - key: MAIL_PASSWORD
        sync: false
      - key: AWS_S3_BUCKET
        value: "kudreambuck"
      - key: AWS_S3_REGION
        value: "ap-east-2"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ECPAY_MERCHANT_ID
        sync: false
      - key: ECPAY_HASH_KEY
        sync: false
      - key: ECPAY_HASH_IV
        sync: false
      - key: ECPAY_PAYMENT_URL
        sync: false
      - key: ECPAY_INVOICE_URL
        sync: false

databases:
  - name: onepage-db
    databaseName: onepage
    user: onepage_user
    plan: free
