          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    # ── Inventory ──

    InventoryDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        productName:
          type: string
        stockQuantity:
          type: integer
        lowStockThreshold:
          type: integer
        isLowStock:
          type: boolean

    # ── Email Template ──

    EmailTemplateDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        templateType:
          type: string
          enum: [ORDER_CONFIRMED, PAYMENT_SUCCESS, PAYMENT_FAILED, SHIPPED]
        subject:
          type: string
        bodyHtml:
          type: string
        availableVariables:
          type: array
          description: 可用變數清單（REQ-032）
          items:
            $ref: '#/components/schemas/TemplateVariableDTO'
        updatedAt:
          type: string
          format: date-time

    TemplateVariableDTO:
      type: object
      description: Email 模板可用變數定義（REQ-032）
      properties:
        variable:
          type: string
          description: 變數名稱（如 {{customerName}}）
          example: "{{customerName}}"
        description:
          type: string
          description: 變數中文說明
          example: "顧客姓名"

    UpdateEmailTemplateRequest:
      type: object
      required: [subject, bodyHtml]
      properties:
        subject:
          type: string
          minLength: 1
        bodyHtml:
          type: string
          minLength: 1
          description: 模板內文（HTML）。可用變數：{{customerName}}、{{orderNumber}}、{{totalAmount}}、{{websiteName}}、{{contactInfo}}（REQ-032）

    # ── Common ──

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time
